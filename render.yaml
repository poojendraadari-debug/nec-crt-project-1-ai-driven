services:
  - type: web
    name: ai-driven-customer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
